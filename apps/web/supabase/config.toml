# Humanberto portfolio — remote Supabase only (no local Docker required).
project_id = "humanberto-portfolio"

[api]
enabled = true
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
major_version = 15

[db.migrations]
enabled = true

[db.seed]
enabled = false

# Auth redirect allow-list (mirrors configure-auth.mjs — hosted project uses Dashboard/API).
[auth]
site_url = "https://humanberto.com"
additional_redirect_urls = [
  "https://humanberto.com/auth/callback",
  "http://localhost:3000/auth/callback",
  "http://localhost:3001/auth/callback",
  "http://localhost:3005/auth/callback",
  "https://*.vercel.app/auth/callback",
]
